<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日蘭多休假中 - Lando is Out of Office</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --accent-color: #333333;
            --light-gray: #f2f2f2;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        /* Logo 樣式 */
        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--text-color);
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        header h1 {
            font-size: 1.5rem;
            margin: 10px 0 5px;
            letter-spacing: 3px;
        }

        .subtitle {
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        /* Menu Section */
        .menu-item {
            margin-bottom: 40px;
            text-align: left;
        }

        h2 {
            font-size: 1.1rem;
            border-bottom: 1px solid #000;
            padding-bottom: 8px;
            margin-bottom: 20px;
        }

        .item-info {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 10px;
        }

        .item-name { font-weight: bold; font-size: 1.1rem; }
        .item-desc { font-size: 0.85rem; color: #666; line-height: 1.5; margin-bottom: 15px; }

        /* Options */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .option-label {
            display: block;
            padding: 10px;
            border: 1px solid #ddd;
            font-size: 0.85rem;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }

        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .option-label {
            background-color: #000;
            color: #fff;
            border-color: #000;
        }

        .fixed-tag {
            display: inline-block;
            font-size: 0.75rem;
            background: var(--light-gray);
            padding: 2px 8px;
            margin-top: 5px;
            border-radius: 4px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: #000;
            color: #fff;
            border: none;
            font-size: 1rem;
            margin-top: 20px;
            cursor: pointer;
            letter-spacing: 2px;
        }

        /* Receipt Modal */
        #modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .receipt-box { width: 80%; max-width: 300px; text-align: center; border: 1px solid #000; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <!-- 請將下方的 src 替換為您的圖片連結或檔案路徑 -->
        <img src="logo.png" alt="Lando Logo">
    </div>

    <header>
        <h1>今日蘭多休假中</h1>
        <div class="subtitle">Lando is Out of Office</div>
    </header>

    <form id="orderForm">
        <!-- 抹茶區塊 -->
        <div class="menu-item">
            <h2>MATCHA</h2>
            <div class="item-info">
                <span class="item-name">抹茶拿鐵</span>
            </div>
            <div class="item-desc">選用日本優質抹茶粉，現點現刷。</div>
            <div class="fixed-tag">固定：無糖 / 冰</div>
            
            <div style="margin-top: 15px; font-size: 0.8rem; color: #999;">選擇奶類：</div>
            <div class="options-grid">
                <label><input type="radio" name="milk" value="牛奶" checked><span class="option-label">牛奶</span></label>
                <label><input type="radio" name="milk" value="燕麥奶"><span class="option-label">燕麥奶</span></label>
                <label><input type="radio" name="milk" value="杏仁奶"><span class="option-label">杏仁奶</span></label>
            </div>
        </div>

        <!-- 咖啡區塊 -->
        <div class="menu-item">
            <h2>COFFEE</h2>
            <div class="item-info">
                <span class="item-name">手沖咖啡</span>
            </div>
            <div class="item-desc">當季限定選豆。目前提供：衣索比亞 / 淺焙。</div>
            <div class="fixed-tag">飲用方式：手沖 (Pour Over)</div>
            
            <div style="margin-top: 15px; font-size: 0.8rem; color: #999;">選擇溫度：</div>
            <div class="options-grid">
                <label><input type="radio" name="temp" value="熱" checked><span class="option-label">熱</span></label>
                <label><input type="radio" name="temp" value="冰"><span class="option-label">冰</span></label>
                <label style="visibility: hidden;"><span class="option-label">-</span></label>
            </div>
        </div>

        <button type="button" class="submit-btn" onclick="sendOrder()">選好了</button>
    </form>
</div>

<div id="modal" onclick="this.style.display='none'">
    <div class="receipt-box">
        <h3 style="margin-top:0;">ORDER</h3>
        <div id="result"></div>
        <div style="margin-top: 20px; font-size: 0.8rem; border-top: 1px dashed #ccc; padding-top: 10px;">
            請將畫面出示給 Mily
        </div>
    </div>
</div>

<script>
    function sendOrder() {
        const milk = document.querySelector('input[name="milk"]:checked').value;
        const temp = document.querySelector('input[name="temp"]:checked').value;
        
        // 這邊僅示範呈現結果，可以根據點擊的是哪一區塊微調
        document.getElementById('result').innerHTML = `
            <p><strong>抹茶拿鐵</strong> (無糖/冰)<br>奶類：${milk}</p>
            <p><strong>手沖咖啡</strong><br>溫度：${temp}</p>
        `;
        document.getElementById('modal').style.display = 'flex';
    }
</script>

</body>
</html>
